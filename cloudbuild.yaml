steps:
  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/resourcematch/app:$SHORT_SHA",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/resourcematch/app:latest",
        ".",
      ]

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/resourcematch/app:$SHORT_SHA"]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "${_REGION}-docker.pkg.dev/$PROJECT_ID/resourcematch/app:latest"]

  # Run Prisma migrations via Cloud SQL Auth Proxy
  - name: "node:20"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        curl -so /workspace/cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
        chmod +x /workspace/cloud-sql-proxy
        mkdir -p /cloudsql
        /workspace/cloud-sql-proxy --unix-socket=/cloudsql ${_CLOUD_SQL_INSTANCE} &
        sleep 5
        cd /workspace
        npx prisma@6 migrate deploy
    secretEnv: ["DATABASE_URL"]

  # Deploy to Cloud Run with Cloud SQL connector
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "resourcematch"
      - "--image"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/resourcematch/app:$SHORT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "10"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--add-cloudsql-instances"
      - "${_CLOUD_SQL_INSTANCE}"
      - "--set-secrets"
      - "DATABASE_URL=DATABASE_URL:latest,NEXTAUTH_URL=NEXTAUTH_URL:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:latest,STRIPE_STARTER_PRICE_ID=STRIPE_STARTER_PRICE_ID:latest,STRIPE_GROWTH_PRICE_ID=STRIPE_GROWTH_PRICE_ID:latest,STRIPE_ENTERPRISE_PRICE_ID=STRIPE_ENTERPRISE_PRICE_ID:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,ADMIN_EMAILS=ADMIN_EMAILS:latest"

substitutions:
  _REGION: "asia-southeast1"
  _CLOUD_SQL_INSTANCE: "resourcematch-prod:asia-southeast1:resourcematch-db"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL/versions/latest
      env: "DATABASE_URL"

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/resourcematch/app:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/resourcematch/app:latest"
